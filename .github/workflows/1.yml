name: T1 (Shards 0-4)
on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 * * 1-5'
jobs:
  scrape:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        shard: [0, 1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install selenium beautifulsoup4 gspread webdriver-manager
      - name: Write credentials
        run: |
          echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json
      - name: Run scraper
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_STEP: 25
          CHECKPOINT_FILE: checkpoint_g1_${{ matrix.shard }}.txt
        run: python run_scraper.py
