name: Scraper Shard 0 (1-500)
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SHARD_INDEX: 0
      SHARD_SIZE: 500
      CHECKPOINT_FILE: "checkpoint_0.txt"
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install selenium webdriver-manager beautifulsoup4 gspread google-auth
      - name: Create credentials.json
        run: echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
      - name: Run Scraper
        run: python run_scraper.py
