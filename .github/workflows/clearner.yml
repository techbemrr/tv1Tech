name: TradingView Sharded Scraper cleaner

on:
  workflow_dispatch: # Allows you to run it manually whenever you see blanks
  schedule:
    - cron: '30 2 * * *' # Example: Runs 2.5 hours after your main scraper starts

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager gspread oauth2client

      - name: Create Credentials and Cookies
        run: |
          # This method prevents the JSONDecodeError by preserving the JSON structure
          cat <<EOF > credentials.json
          ${{ secrets.GSPREAD_JSON }}
          EOF
          
          cat <<EOF > cookies.json
          ${{ secrets.TRADINGVIEW_COOKIES }}
          EOF

      - name: Run Cleaner Script
        env:
          # Keeping these here in case your cleaner.py logic uses them for logging
          SHARD_INDEX: 0
          SHARD_SIZE: 2500
        run: python cleaner.py

      - name: Upload Logs (Optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-log
          path: "*.txt" # Captures any logs or checkpoints if generated
