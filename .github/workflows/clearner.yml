name: TradingView Sharded Scraper cleaner

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    - cron: '30 2 * * *' # Runs daily at 2:30 AM

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager gspread oauth2client

      - name: Create Credentials and Cookies
        shell: bash
        run: |
          # Print the secret directly into the file to avoid shell interpretation issues
          printf '%s' '${{ secrets.GSPREAD_JSON }}' > credentials.json
          printf '%s' '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json
          
          # Log verification for debugging
          if [ -s credentials.json ]; then
            echo "✅ credentials.json created (Size: $(stat -c%s credentials.json) bytes)"
          else
            echo "❌ credentials.json is EMPTY. Check GitHub Secrets!"
            exit 1
          fi

      - name: Run Cleaner Script
        env:
          SHARD_INDEX: 0
          SHARD_SIZE: 2500
        run: python cleaner.py

      - name: Upload Cleanup Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-report
          path: "*.txt"
