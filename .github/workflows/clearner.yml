name: TradingView Cleaner Shards

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        shard_index: [0, 1, 2, 3, 4] # Covers 5 shards of ~500 rows each

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install selenium gspread webdriver-manager

      - name: Write credentials
        run: |
          echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json

      - name: Run cleaner
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_SIZE: 510 # 510 * 5 = 2550 total symbols covered
        run: python cleaner.py
